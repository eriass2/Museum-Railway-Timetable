# Kör samma snabbkontroll som lokalt: composer check (host — see docs/CI_AND_DEV_MODEL.md).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run local quick checks
        run: composer check

      - name: Vue frontend check
        run: composer vue:check

      - name: Vue E2E smoke (Docker, matches mrt e2e)
        run: bash scripts/gate/e2e.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/vue/playwright-report/
          if-no-files-found: ignore

  e2e-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: WordPress E2E (Docker + Playwright)
        run: bash scripts/ci-e2e-wp.sh || bash scripts/ci-e2e-wp.sh
