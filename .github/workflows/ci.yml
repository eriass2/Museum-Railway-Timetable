# Kör samma snabbkontroll som lokalt: composer check.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run local quick checks
        run: composer check

      - name: Vue frontend check
        run: composer vue:check

      - name: Install Playwright Chromium
        run: npx --prefix frontend/vue playwright install chromium --with-deps

      - name: Vue E2E smoke
        run: npm --prefix frontend/vue run e2e
