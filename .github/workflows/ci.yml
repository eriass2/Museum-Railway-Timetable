# Kör samma snabbkontroll som lokalt: composer check (host — see docs/CI_AND_DEV_MODEL.md).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run local quick checks
        run: composer check

      - name: Vue frontend check
        run: composer vue:check

      - name: Vue E2E smoke (Docker, matches mrt e2e)
        run: bash scripts/gate/e2e.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/vue/playwright-report/
          if-no-files-found: ignore

  e2e-wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: WordPress E2E (Docker + Playwright)
        id: e2ewp
        continue-on-error: true
        run: bash scripts/ci-e2e-wp.sh

      - name: Retry WordPress E2E after Docker warmup failure
        id: e2ewp_retry
        if: steps.e2ewp.outcome == 'failure'
        run: bash scripts/ci-e2e-wp.sh

      - name: Require WordPress E2E pass
        if: always()
        run: |
          if [ "${{ steps.e2ewp.outcome }}" = "success" ] || [ "${{ steps.e2ewp_retry.outcome }}" = "success" ]; then
            echo "WordPress E2E passed"
          else
            echo "WordPress E2E failed on both attempts" >&2
            exit 1
          fi
