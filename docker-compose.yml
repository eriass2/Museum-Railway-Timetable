services:
  db:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build: .
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WPLANG', 'sv_SE' );
        define( 'MRT_DEVELOPMENT', true );
        define( 'MRT_LENNAKATTEN_BRAND', true );
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/museum-railway-timetable

  wordpress-init:
    image: wordpress:cli-php8.2
    user: root
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_ADMIN_USER: admin
      WORDPRESS_ADMIN_PASSWORD: admin
      WORDPRESS_ADMIN_EMAIL: admin@example.test
      WORDPRESS_SITE_TITLE: Museum Railway Timetable
      WORDPRESS_SITE_URL: http://localhost:8080
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/museum-railway-timetable
      - ./docker/ensure-sv-locale.sh:/usr/local/bin/mrt-ensure-sv-locale.sh:ro
    command: >
      sh -c '
        until [ -f wp-config.php ] && wp --allow-root db check >/dev/null 2>&1; do
          sleep 3;
        done;
        if ! wp --allow-root core is-installed >/dev/null 2>&1; then
          wp --allow-root core install \
            --url="$${WORDPRESS_SITE_URL}" \
            --title="$${WORDPRESS_SITE_TITLE}" \
            --admin_user="$${WORDPRESS_ADMIN_USER}" \
            --admin_password="$${WORDPRESS_ADMIN_PASSWORD}" \
            --admin_email="$${WORDPRESS_ADMIN_EMAIL}" \
            --locale=sv_SE \
            --skip-email;
        fi;
        sh /usr/local/bin/mrt-ensure-sv-locale.sh;
        wp --allow-root plugin activate museum-railway-timetable;
        wp --allow-root rewrite structure '/%postname%/' --hard;
      '

  # PHP tooling — no Node. Do not run composer vue:* here; use the vue service.
  composer:
    image: composer:2
    entrypoint:
      - composer
    profiles:
      - tools
    working_dir: /app
    volumes:
      - ./:/app
      - mrt_vendor:/app/vendor
    command: install

  # PHPUnit with PHP 8.2 — matches CI (see scripts/test.ps1).
  php-test:
    build:
      context: docker
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    working_dir: /app
    volumes:
      - ./:/app
      - mrt_vendor:/app/vendor
    entrypoint:
      - php

  # Node 22 — Vue build/check. Examples:
  #   docker compose --profile tools run --rm --no-deps vue sh -c "<npm ci if needed> && npm run check"
  #   docker compose --profile tools run --rm --no-deps vue sh -c "<npm ci if needed> && npm run build && npm run verify"
  vue:
    image: node:22-alpine
    profiles:
      - tools
    working_dir: /app/frontend/vue
    volumes:
      - ./:/app
      - mrt_vue_node_modules:/app/frontend/vue/node_modules

volumes:
  db_data:
  wordpress_data:
  mrt_vendor:
  mrt_vue_node_modules:
