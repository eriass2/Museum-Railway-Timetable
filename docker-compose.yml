services:
  db:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build: .
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WPLANG', 'sv_SE' );
        define( 'MRT_DEVELOPMENT', true );
        define( 'MRT_LENNAKATTEN_BRAND', true );
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/museum-railway-timetable

  wordpress-init:
    image: wordpress:cli-php8.2
    user: root
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_ADMIN_USER: admin
      WORDPRESS_ADMIN_PASSWORD: admin
      WORDPRESS_ADMIN_EMAIL: admin@example.test
      WORDPRESS_SITE_TITLE: Museum Railway Timetable
      WORDPRESS_SITE_URL: http://localhost:8080
      WORDPRESS_INTERNAL_URL: http://wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/museum-railway-timetable
      - ./docker/ensure-sv-locale.sh:/usr/local/bin/mrt-ensure-sv-locale.sh:ro
      - ./docker/wordpress-init.sh:/usr/local/bin/mrt-wordpress-init.sh:ro
    command: ['sh', '/usr/local/bin/mrt-wordpress-init.sh']

  # Long-running WP-CLI sidecar — scripts use `compose exec wpcli` when up (Fas 2 P5).
  wpcli:
    image: wordpress:cli-php8.2
    user: root
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/museum-railway-timetable
      - ./docker/ensure-sv-locale.sh:/usr/local/bin/mrt-ensure-sv-locale.sh:ro
    working_dir: /var/www/html
    entrypoint: ['sh', '-c']
    command: ['sleep infinity']
    restart: unless-stopped

  # PHP tooling — no Node. Do not run composer vue:* here; use the vue service.
  # Long-running shell (P6): scripts use `compose exec`; start with:
  #   docker compose --profile tools up -d composer php-test vue
  composer:
    image: composer:2
    profiles:
      - tools
    working_dir: /app
    volumes:
      - ./:/app
      - mrt_vendor:/app/vendor
    entrypoint: ['sh', '-c']
    command: ['sleep infinity']
    restart: unless-stopped

  # PHPUnit with PHP 8.2 — matches CI (see scripts/test.ps1).
  php-test:
    build:
      context: docker
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    working_dir: /app
    volumes:
      - ./:/app
      - mrt_vendor:/app/vendor
    entrypoint: ['sh', '-c']
    command: ['sleep infinity']
    restart: unless-stopped

  # Node 22 — Vue build/check. Example:
  #   docker compose --profile tools exec --no-TTY vue sh -c "<npm ci if needed> && npm run check"
  vue:
    image: node:22-alpine
    profiles:
      - tools
    working_dir: /app/frontend/vue
    volumes:
      - ./:/app
      - mrt_vue_node_modules:/app/frontend/vue/node_modules
    entrypoint: ['sh', '-c']
    command: ['sleep infinity']
    restart: unless-stopped

  # Playwright + Node 22 (Jammy) — Vue E2E only (browsers preinstalled).
  # Match @playwright/test in frontend/vue/package-lock.json (1.61.x).
  #   docker compose --profile tools run --rm --no-deps vue-e2e sh -c "npm run e2e"
  vue-e2e:
    image: mcr.microsoft.com/playwright:v1.61.0-jammy
    profiles:
      - tools
    working_dir: /app/frontend/vue
    volumes:
      - ./:/app
      - mrt_vue_node_modules:/app/frontend/vue/node_modules
    entrypoint: ['sh', '-c']
    command: ['sleep infinity']
    restart: unless-stopped

volumes:
  db_data:
  wordpress_data:
  mrt_vendor:
  mrt_vue_node_modules:
